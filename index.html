<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trình Quét Mã QR (Safari Compatible)</title>
    
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        h2 {
            color: #1d1d1f;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            padding: 16px;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
        }

        /* Khung chứa camera tối ưu cho iOS/Safari */
        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: none;
            background: #000000;
        }

        /* Tùy chỉnh video của Safari không bị tràn viền */
        #reader video {
            object-fit: cover !important;
            border-radius: 12px;
        }

        /* Khung hiển thị kết quả */
        .result-container {
            margin-top: 20px;
            padding: 16px;
            background-color: #f2f2f7;
            border-radius: 12px;
            word-wrap: break-word;
            display: none;
        }

        .result-title {
            font-weight: 600;
            color: #86868b;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        #result-text {
            color: #1d1d1f;
            font-size: 16px;
            font-weight: 500;
            line-height: 1.4;
        }

        /* Định dạng lại các nút bấm hệ thống tự sinh ra */
        button {
            background-color: #0071e3 !important; /* Màu xanh đặc trưng Apple */
            color: #ffffff !important;
            border: none !important;
            padding: 12px 22px !important;
            font-size: 15px !important;
            font-weight: 500 !important;
            border-radius: 8px !important;
            cursor: pointer !important;
            margin: 10px 0 !important;
            width: 100%;
            transition: background 0.2s ease;
            -webkit-appearance: none; /* Xóa style mặc định của iOS */
        }
        button:active {
            background-color: #005bb5 !important;
        }
        select {
            width: 100%;
            padding: 10px !important;
            border-radius: 8px !important;
            border: 1px solid #d2d2d7 !important;
            background-color: #fff !important;
            font-size: 15px !important;
            margin-bottom: 12px !important;
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

    <h2>Máy Quét Mã QR</h2>

    <div class="container">
        <div id="reader"></div>

        <div class="result-container" id="result-box">
            <div class="result-title">Nội dung quét được</div>
            <div id="result-text">Đang chờ quét...</div>
        </div>
    </div>

    <script>
        // Hàm xử lý khi quét thành công
        function onScanSuccess(decodedText, decodedResult) {
            const resultBox = document.getElementById('result-box');
            const resultText = document.getElementById('result-text');
            
            resultBox.style.display = 'block';
            
            // Nếu là liên kết, tạo thẻ A để bấm được luôn
            if (decodedText.startsWith('http://') || decodedText.startsWith('https://')) {
                resultText.innerHTML = `<a href="${decodedText}" target="_blank" style="color: #0071e3; text-decoration: none; word-break: break-all;">${decodedText} ↗</a>`;
            } else {
                resultText.innerText = decodedText;
            }

            // Phản hồi rung nhẹ trên điện thoại khi quét trúng (nếu thiết bị hỗ trợ)
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }
        }

        function onScanFailure(error) {
            // Để trống để tránh quá tải bộ nhớ trên Safari
        }

        // Cấu hình quét tối ưu cho Safari và iOS
        const config = { 
            fps: 15, // Tăng tốc độ quét lên 15fps
            qrbox: function(viewfinderWidth, viewfinderHeight) {
                // Tạo khung quét vuông bằng 65% cạnh nhỏ nhất của màn hình
                let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
                let qrboxSize = Math.floor(minEdgeSize * 0.65);
                if (qrboxSize < 200) qrboxSize = 200; // Không để khung quá nhỏ
                return { width: qrboxSize, height: qrboxSize };
            },
            experimentalFeatures: {
                useBarCodeDetectorIfSupported: true // Tận dụng phần cứng Apple nếu có hỗ trợ
            }
        };

        // Khởi tạo máy quét
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", config, /* verbose= */ false);
        
        // Chạy máy quét
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>

</body>
</html>
