<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Điểm Danh QR Code</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
            background-color: #f4f4f9;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        #reader {
            width: 100%;
            max-width: 500px;
            /* Tối ưu cho thiết bị di động */
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background: #fff;
        }

        #result-box {
            margin-top: 20px;
            padding: 15px;
            font-size: 16px;
            color: #333;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            word-break: break-all;
        }

        .success {
            color: #28a745;
            font-weight: bold;
        }

        .error {
            color: #dc3545;
            font-weight: bold;
        }

        .loading {
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Điểm Danh QR</h2>

    <div id="reader"></div>

    <div id="result-box">Đang đợi cấp quyền Camera...</div>

    <script>
        // BƯỚC QUAN TRỌNG: Dán URL Web App của Google Apps Script vào đây
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwVxDtXdMx0pbEzyvu9fQuDukgPPPRncs-oJYGlzP9jAfGPvcrGsTLukG92tw7l60O9uw/exec";

        let lastScannedText = "";
        let lastScannedTime = 0;
        const cooldownTime = 4000; // Thời gian chờ (4 giây) giữa 2 lần quét cùng 1 mã để chống spam

        function onScanSuccess(decodedText, decodedResult) {
            const currentTime = new Date().getTime();

            // Logic chống quét lặp lại: Bỏ qua nếu quét cùng 1 mã trong vòng 4 giây
            if (decodedText === lastScannedText && (currentTime - lastScannedTime) < cooldownTime) {
                return;
            }

            // Lưu lại mã và thời gian vừa quét
            lastScannedText = decodedText;
            lastScannedTime = currentTime;

            // Hiển thị trạng thái
            const resultBox = document.getElementById('result-box');
            resultBox.innerHTML = `<span class="loading">Đang ghi nhận:</span> ${decodedText}...`;

            // Gửi dữ liệu tới Google Sheets thông qua POST
            fetch(GAS_WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // Sử dụng no-cors để tránh lỗi CORS khi gọi từ HTML tĩnh
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: JSON.stringify({ qrText: decodedText })
            })
                .then(() => {
                    // Do dùng no-cors nên không đọc được JSON response, nhưng fetch chạy thành công nghĩa là đã gửi đi
                    resultBox.innerHTML = `<span class="success">✓ Thành công!</span><br>Đã lưu: ${decodedText}`;

                    // Trả lại thông báo mặc định sau 2.5 giây
                    setTimeout(() => {
                        if (resultBox.innerText.includes('Thành công')) {
                            resultBox.innerHTML = "Sẵn sàng quét mã tiếp theo...";
                        }
                    }, 2500);
                })
                .catch(error => {
                    console.error('Lỗi khi gửi dữ liệu:', error);
                    resultBox.innerHTML = `<span class="error">✗ Lỗi khi lưu dữ liệu! Hãy thử lại.</span>`;
                });
        }

        function onScanFailure(error) {
            // Các lỗi đọc khung hình liên tục sẽ bỏ qua ở đây để không làm gián đoạn
            // console.warn(`Scan error = ${error}`);
        }

        // Cấu hình máy quét mã QR
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            {
                fps: 10,  // Tốc độ quét 10 khung hình/giây
                qrbox: { width: 250, height: 250 }, // Vùng focus vuông
                aspectRatio: 1.0,
                showTorchButtonIfSupported: true // Hiện nút bật đèn Flash nếu điện thoại hỗ trợ
            },
            false // verbose = false để ẩn log
        );

        // Khởi động Camera
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        // Cập nhật trạng thái sau khi load
        setTimeout(() => {
            document.getElementById('result-box').innerHTML = "Hãy đưa mã QR vào khung hình camera.";
        }, 2000);

    </script>
</body>

</html>
