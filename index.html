<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Quét Mã QR</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        /* Khung chứa camera */
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #ddd;
            background: #000;
        }

        /* Khung hiển thị kết quả */
        .result-container {
            margin-top: 20px;
            padding: 15px;
            background-color: #eef9f5;
            border-left: 5px solid #2ecc71;
            border-radius: 4px;
            word-wrap: break-word;
            display: none; /* Ẩn đi khi chưa có kết quả */
        }

        .result-title {
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 5px;
        }

        #result-text {
            color: #333;
            font-size: 16px;
        }

        /* Tùy chỉnh lại nút bấm của thư viện cho đẹp hơn */
        button {
            background-color: #3498db !important;
            color: white !important;
            border: none !important;
            padding: 10px 20px !important;
            font-size: 14px !important;
            border-radius: 5px !important;
            cursor: pointer !important;
            margin: 10px 0 !important;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9 !important;
        }
        select {
            padding: 8px !important;
            border-radius: 5px !important;
            border: 1px solid #ccc !important;
            margin-bottom: 10px !important;
        }
    </style>
</head>
<body>

    <h2>Máy Quét Mã QR Của Bạn</h2>

    <div class="container">
        <div id="reader"></div>

        <div class="result-container" id="result-box">
            <div class="result-title">Kết quả quét được:</div>
            <div id="result-text">Chưa có dữ liệu</div>
        </div>
    </div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            // Hiển thị khung kết quả
            const resultBox = document.getElementById('result-box');
            const resultText = document.getElementById('result-text');
            
            resultBox.style.display = 'block';
            
            // Kiểm tra nếu kết quả là một đường link (URL) thì tạo thẻ <a> để bấm vào được luôn
            if (decodedText.startsWith('http://') || decodedText.startsWith('https://')) {
                resultText.innerHTML = `<a href="${decodedText}" target="_blank" style="color: #3498db; text-decoration: underline;">${decodedText}</a>`;
            } else {
                resultText.innerText = decodedText;
            }
            
            // Tùy chọn: Bạn có thể dừng quét sau khi thành công bằng lệnh dưới đây
            // html5QrcodeScanner.clear();
        }

        function onScanFailure(error) {
            // Hàm này chạy liên tục khi camera không tìm thấy QR trong khung hình.
            // Bạn nên để trống để tránh làm chậm ứng dụng hoặc tràn log.
        }

        // Khởi tạo máy quét QR
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, // Số khung hình trên giây để quét
                qrbox: { width: 250, height: 250 } // Kích thước khung vuông nhắm QR
            },
            /* verbose= */ false
        );
        
        // Bắt đầu chạy máy quét
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>

</body>
</html>
